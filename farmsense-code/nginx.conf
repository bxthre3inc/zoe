events {}

http {
    server {
        listen 80;
        
        # Primary FarmSense Application (Farmer Dashboard)
        location /farmsense/ { 
            proxy_pass http://farmer-dashboard:80/; 
        }

        # FarmSense Backend API
        location /farmsense/api/ { 
            proxy_pass http://backend:8000/api/; 
        }

        # Secondary FarmSense Portals
        location /farmsense/admin/ { proxy_pass http://admin-dashboard:80/; }
        location /farmsense/regulatory/ { proxy_pass http://regulatory-portal:80/; }
        location /farmsense/research/ { proxy_pass http://research-portal:80/; }
        location /farmsense/investor/ { proxy_pass http://investor-dashboard:80/; }
        location /farmsense/grant/ { proxy_pass http://grant-portal:80/; }
        location /farmsense/docs/ { proxy_pass http://docs-portal:80/; }
        location /farmsense/marketing/ { proxy_pass http://marketing-site:80/; }
    }
}
